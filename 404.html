<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Страница не найдена · TAL RESORT — Aqua &amp; SPA</title>
  <meta name="robots" content="noindex, follow" />
  <meta name="theme-color" content="#14271d" />

  <link rel="icon" type="image/svg+xml" href="assets/logo.svg" />
  <link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32.png" />
  <link rel="apple-touch-icon" href="assets/apple-touch-icon.png" />

  <link rel="stylesheet" href="css/fonts.css" />

  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html { -webkit-text-size-adjust: 100%; }

    body {
      min-height: 100vh;
      min-height: 100svh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: calc(2rem + env(safe-area-inset-top)) 1.5rem calc(2rem + env(safe-area-inset-bottom));
      font-family: "Inter", system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      color: #14271d;
      background-color: #f7f3e9;
      background-image: radial-gradient(120% 90% at 50% 0%, #fbf8f0 0%, #f7f3e9 55%, #efe7d4 100%);
      -webkit-font-smoothing: antialiased;
      line-height: 1.6;
      -webkit-tap-highlight-color: transparent;
    }

    .e404 {
      width: 100%;
      max-width: 34rem;
      text-align: center;
      animation: rise 0.7s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    .e404__logo {
      width: 64px;
      height: 64px;
      margin: 0 auto 2rem;
      display: block;
    }

    .e404__code {
      font-family: "Playfair Display", Georgia, serif;
      font-weight: 500;
      font-size: clamp(5.5rem, 22vw, 9rem);
      line-height: 0.9;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, #c9a96e 0%, #a9853f 60%, #8a6c34 100%);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .e404__title {
      font-family: "Playfair Display", Georgia, serif;
      font-weight: 500;
      font-size: clamp(1.5rem, 6vw, 2rem);
      margin-top: 0.75rem;
    }

    .e404__text {
      margin-top: 0.9rem;
      font-size: 1rem;
      color: rgba(20, 39, 29, 0.7);
    }

    .e404__alt {
      margin-top: 0.5rem;
      font-size: 0.82rem;
      letter-spacing: 0.02em;
      color: rgba(20, 39, 29, 0.45);
    }

    .e404__btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.6rem;
      margin-top: 2rem;
      min-height: 48px;
      padding: 0.95rem 2.4rem;
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      color: #14271d;
      text-decoration: none;
      border-radius: 100px;
      background: linear-gradient(135deg, #f0d9a4 0%, #e8cd92 22%, #c9a96e 55%, #a78850 100%);
      box-shadow: 0 12px 30px rgba(169, 133, 63, 0.35);
      transition: transform 0.25s ease, box-shadow 0.25s ease;
    }

    .e404__btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 18px 40px rgba(169, 133, 63, 0.5);
    }

    @keyframes rise {
      from { opacity: 0; transform: translateY(18px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (prefers-reduced-motion: reduce) {
      .e404 { animation: none; }
      .e404__btn { transition: none; }
    }
  </style>
</head>
<body>
  <main class="e404">
    <img class="e404__logo" src="assets/logo.svg" alt="TAL RESORT — Aqua &amp; SPA" />
    <div class="e404__code">404</div>
    <h1 class="e404__title">Страница не найдена</h1>
    <p class="e404__text">
      Похоже, такой страницы нет или она переехала. Вернитесь на главную и продолжите знакомство с курортом.
    </p>
    <p class="e404__alt">Бет табылмады · Page not found</p>
    <a class="e404__btn" href="/">Вернуться на главную</a>
  </main>
</body>
</html>
